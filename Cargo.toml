[workspace]
members = ["crates/core", "crates/registry", "crates/runtime"]
exclude = ["examples/hello"]
resolver = "3"




[workspace.dependencies]
wasmtime = "=44.0.0"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_bytes = "0.11"
parking_lot = "0.12"
base64 = "0.22"


rune-core = {path = "crates/core"}
rune-registry = {path = "crates/registry"}
rune-runtime = {path = "crates/runtime"}
