[workspace]
git_only = true
publish = false
release_always = true
semver_check = false
changelog_update = false
# Suppress tags/releases for ALL crates by default.
# Individual [[package]] blocks below opt-in the binary crates.
git_tag_enable = false
git_release_enable = false

# ── Binary crates (opted in) ─────────────────────────────────────────────────

[[package]]
name = "rune-server"
version_group = "alpha"
changelog_update = true
changelog_path = "./CHANGELOG.md"
# Pull changes from all workspace members into the server changelog.
changelog_include = ["runectl", "rune-core", "rune-registry", "rune-runtime"]
git_tag_enable = true
git_tag_name = "v{{ version }}"
git_release_enable = true
git_release_name = "v{{ version }}"
git_release_type = "pre"
git_release_latest = false

[[package]]
name = "runectl"
version_group = "alpha"
# runectl shares the version group with rune-server so they bump together,
# but it doesn't get its own changelog or release — rune-server's release
# uploads both binaries.
git_tag_enable = false
git_release_enable = false

# ── Internal library crates (explicitly suppressed) ──────────────────────────

[[package]]
name = "rune-core"
git_tag_enable = false
git_release_enable = false
changelog_update = false

[[package]]
name = "rune-registry"
git_tag_enable = false
git_release_enable = false
changelog_update = false

[[package]]
name = "rune-runtime"
git_tag_enable = false
git_release_enable = false
changelog_update = false
