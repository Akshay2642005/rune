[build]
target = "index.html"
dist = "dist"
public_url = "/"

[[hooks]]
stage = "build"
command = "bunx"
command_arguments = ["@tailwindcss/cli", "-i", "style/tailwind.css", "-o", "style/output.css"]

[[proxy]]
backend = "http://localhost:3000/ui/session"
rewrite = "/ui/session"

[[proxy]]
backend = "http://localhost:3000/api"
rewrite = "/api"
